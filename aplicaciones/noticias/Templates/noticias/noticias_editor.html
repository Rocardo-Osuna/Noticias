{% extends 'base.html' %}

{% block contenido %}

<style>
    .card-editor {
        display: flex;
        gap: 20px;
        background: rgba(255,255,255,0.04);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 20px;
        align-items: center;
        transition: 0.3s;
    }

    .card-editor:hover {
        background: rgba(255,255,255,0.08);
        transform: scale(1.01);
    }

    .card-img {
        width: 180px;
        height: 120px;
        object-fit: cover;
        border-radius: 10px;
        flex-shrink: 0;
    }

    .card-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .titulo {
        font-size: 1.4rem;
        font-weight: bold;
        color: white;
        margin-bottom: 8px;
    }

    .meta {
        font-size: 0.85rem;
        color: rgba(255,255,255,0.6);
    }

    .acciones {
        display: flex;
        gap: 10px;
    }

    .btn-editar {
        background: linear-gradient(45deg, #ffc107, #ff9800);
        border: none;
        color: black;
        font-weight: bold;
        padding: 6px 12px;
        border-radius: 6px;
    }

    .btn-eliminar {
        background: linear-gradient(45deg, #ff4d4d, #cc0000);
        border: none;
        color: white;
        font-weight: bold;
        padding: 6px 12px;
        border-radius: 6px;
    }

    .btn-editar:hover,
    .btn-eliminar:hover {
        opacity: 0.9;
    }


@media (max-width: 992px) {
    .card-editor {
        flex-direction: column;
        align-items: stretch;
        justify-content: space-between;
    }

    .card-img {
        width: 100%;
        height: 200px;
        margin-bottom: 10px;
    }

    .acciones {
        margin-top: 10px;
        justify-content: center; 
    }

    .acciones button + button {
        margin-left: 10px; 
    }

    .card-body {
        align-items: stretch;
    }
}
</style>

<div class="container mt-5">

    <h2 class="text-white mb-4">Mis noticias</h2>

    {% for noticia in noticias %}

    <div class="card-editor">

        <!-- Imagen -->
        {% if noticia.portada %}
            <a href="{% url 'noticias:ver_noticia' noticia.slug %}"><img src="{{ noticia.portada.url }}" class="card-img"></a>
        {% endif %}

        <!-- Contenido -->
        <div class="card-body">

            <div class="titulo">
                {{ noticia.titulo }}
            </div>

            <div class="meta">
                {{ noticia.fecha|date:"d M Y" }} | {{ noticia.autor.username }}
            </div>

        </div>


        <div class="acciones">
            <a href="{%url 'noticias:editar_noticia' noticia.id %}"><button class="btn btn-success">Editar</button></a>
            <button class="btn btn-warning">Eliminar</button>
        </div>

    </div>

    {% empty %}
        <p class="text-white">No tienes noticias aún.</p>
    {% endfor %}

</div>

{% endblock %}

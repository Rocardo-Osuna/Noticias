<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Registro</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #ff2a75, #0a0f2c 40%, #000000 100%);
            height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease;
        }


        .custom-input {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
        }

        .custom-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .custom-input:focus {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            box-shadow: none;
        }


        .btn-gradient {
            background: linear-gradient(45deg, #ff2a75, #6a5cff);
            border: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-gradient:hover {
            opacity: 0.9;
        }


        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="w-100 vh-100 d-flex align-items-center justify-content-center">

        <div class="col-11 col-md-4 p-4 glass-card">

            <h3 class="text-white text-center mb-4 fw-bold">Registrar</h3>

            <!-- Mensajes 
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}-->


            <form method="POST">
                {% csrf_token %}

                <!-- Usuario -->
                <div class="mb-4">
                    <input type="text" name="username" class="form-control custom-input" placeholder="Usuario" required>
                </div>

                <!-- Contraseña -->
                <div class="mb-4">
                    <input type="password" name="password" class="form-control custom-input" placeholder="Contraseña"
                        required>
                </div>

                <div class="mb-4">
                    <input type="text" name="nombre" class="form-control custom-input" placeholder="Nombre" required>
                </div>

                <div class="mb-4">
                    <input type="text" name="apellidoP" class="form-control custom-input" placeholder="Apellido paterno"
                        required>
                </div>

                <div class="mb-4">
                    <input type="text" name="apellidoM" class="form-control custom-input" placeholder="Apellido materno"
                        required>
                </div>

                <!-- Next -->
                <input type="hidden" name="next" value="{{ request.GET.next }}">

                <!-- Botón -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-gradient">
                        Registrar
                    </button>
                </div>

            </form>

        <div class="d-flex justify-content-between">
        <p class="text-center text-white-50 mt-3">
            <i class="bi bi-arrow-bar-left"></i> 
            <a href="{{ request.GET.next|default:'/' }}"" class="text-white fw-bold">Regresar</a>
        </p>
        <p class="text-center text-white-50 mt-3">
            ¿No tienes cuenta?
            <a href="{% url 'usuario:registrar' %}?next={{ request.GET.next }}" class="text-white fw-bold">Regístrate</a>
        </p>
        </div>

        </div>

    </div>

</body>

</html>
